{% extends 'base.html' %}
{% block title %}Set New Password – Urban Holidays{% endblock %}
{% block extra_css %}
<style>.auth-section{min-height:100vh;background:linear-gradient(135deg,#0A2463,#1E90FF);display:flex;align-items:center;}</style>
{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-5 rounded-4 shadow-lg">
                    <div class="text-center mb-4" style="font-size:3rem;">🔑</div>
                    <h3 class="fw-bold text-center mb-4" style="color:#0A2463">Set New Password</h3>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-primary w-100 btn-lg">Set Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
