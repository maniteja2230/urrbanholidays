{% extends 'base.html' %}

{% block title %}Password Reset – Urban Holidays{% endblock %}

{% block extra_css %}
<style>
.auth-section { min-height:100vh; background:linear-gradient(135deg,#0A2463 0%,#1E90FF 100%); display:flex; align-items:center; }
.forgot-card { background:white; border-radius:20px; padding:50px 40px; box-shadow:0 30px 70px rgba(0,0,0,0.3); max-width:460px; width:100%; }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="forgot-card text-center">
                    <div class="mb-4" style="font-size:3.5rem;">📧</div>
                    <h3 class="fw-bold mb-2" style="color:#0A2463">Reset Password</h3>
                    <p class="text-muted mb-4">Enter your email to receive a password reset link.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Email address" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="bi bi-envelope me-2"></i>Send Reset Link
                        </button>
                        <div class="mt-3">
                            <a href="{% url 'accounts:login' %}" class="text-primary"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
