{% extends 'base.html' %}
{% block title %}Password Reset Sent – Urban Holidays{% endblock %}
{% block content %}
<section style="min-height:100vh;background:linear-gradient(135deg,#0A2463,#1E90FF);display:flex;align-items:center;">
    <div class="container text-center">
        <div class="card p-5 mx-auto shadow-lg rounded-4" style="max-width:480px;">
            <div style="font-size:3.5rem;">✉️</div>
            <h3 class="fw-bold mt-3 mb-2" style="color:#0A2463">Email Sent!</h3>
            <p class="text-muted">Check your email for a link to reset your password. If it doesn't appear within a few minutes, check your spam folder.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Back to Login</a>
        </div>
    </div>
</section>
{% endblock %}
